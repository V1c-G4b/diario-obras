api:
  image: ghcr.io/v1c-g4b/diario-obras-api
  tag: v1.0.0
  pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

postgres:
  image: bitnami/postgresql:latest
  storage: 1Gi
  port: 5432
  replicas: 1
  clusterIP: None
  envUser: POSTGRESQL_USERNAME
  envPassword: POSTGRESQL_PASSWORD
  envDatabase: POSTGRESQL_DATABASE
  dataPath: /bitnami/postgresql
  securityContext: null

minio:
  image: minio/minio:latest
  storage: 1Gi
  bucket: diario-fotos

ingress:
  enabled: false

autoscaling:
  enabled: false

database:
  name: diario_obra
  user: CHANGE_ME
  password: CHANGE_ME

storage:
  user: CHANGE_ME
  password: CHANGE_ME
