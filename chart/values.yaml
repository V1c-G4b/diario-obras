# API
api:
  replicas: 2
  image: diario-obras-api
  tag: latest
  pullPolicy: Never
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

# Postgres
postgres:
  image: postgres:16-alpine
  storage: 1Gi
  port: 5432
  replicas: 1
  clusterIP: None

# MinIO
minio:
  image: minio/minio:latest
  storage: 1Gi
  bucket: diario-fotos

# Ingress
ingress:
  enabled: true
  host: localhost

# HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70

# Credenciais - (gitignored)
database:
  name: diario_obra
  user: CHANGE_ME
  password: CHANGE_ME

storage:
  user: CHANGE_ME
  password: CHANGE_ME
