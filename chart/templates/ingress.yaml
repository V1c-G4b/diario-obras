{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: diario-obra-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: diario-obra-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: {{.Values.ingress.host}}
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: api-service
                port:
                  number: {{ .Values.api.port }}
{{- end }}
