apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.api.image}}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{.Values.api.replicas}}
  selector:
    matchLabels:
      app: {{.Values.api.image}}
  template:
    metadata:
      labels:
        app: {{.Values.api.image}}
    spec:
      containers:
        - name: {{.Values.api.image}}
          image: {{.Values.api.image}}:{{.Values.api.tag}}
          imagePullPolicy: {{.Values.api.pullPolicy}}
          envFrom:
            - configMapRef:
                name: diario-obra-config
            - secretRef:
                name: diario-obra-secret
          resources:
            limits:
              memory: "{{.Values.api.resources.limits.memory}}"
              cpu: "{{.Values.api.resources.limits.cpu}}"
            requests:
              memory: "{{.Values.api.resources.requests.memory}}"
              cpu: "{{.Values.api.resources.requests.cpu}}"
          ports:
            - containerPort: {{.Values.api.port}}
          readinessProbe:
            httpGet:
              path: /ping
              port: {{.Values.api.port}}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: {{.Values.api.port}}
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{.Values.api.image}}
spec:
  selector:
    app: {{.Values.api.image}}
  ports:
    - port: {{.Values.api.port}}
      targetPort: {{.Values.api.port}}
      name: http
