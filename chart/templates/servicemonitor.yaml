apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: diario-obra-api-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: diario-obra-api
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
