    x-enum-varnames:
    - Ensolarado
    - Nublado
    - Chuvoso
    - Tempestade
  github_com_v1c-g4b_diario-obras_internal_domain_entity.Entrada:
    properties:
      condicoes_climaticas:
        $ref: '#/definitions/github_com_v1c-g4b_diario-obras_internal_domain_entity.CondicaoClimatica'
      criado_em:
        type: string
      custo_dia:
        type: number
      etapa:
        type: string
      fotos:
        items:
          $ref: '#/definitions/github_com_v1c-g4b_diario-obras_internal_domain_entity.Foto'
