      obra_id:
        type: string
      observacoes:
        type: string
      paralisacao:
        type: boolean
      progresso_etapa:
        type: number
      quantidade_trabalhadores:
        type: integer
      responsavel:
        $ref: '#/definitions/github_com_v1c-g4b_diario-obras_internal_domain_entity.Responsavel'
      responsavel_id:
        type: string
    type: object
  github_com_v1c-g4b_diario-obras_internal_domain_entity.Foto:
    properties:
