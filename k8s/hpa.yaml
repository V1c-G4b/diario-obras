apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: diario-obra-api-hpa
  namespace: diario-obra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: diario-obra-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
