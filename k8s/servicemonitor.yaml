apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: diario-obra-api-monitor
  namespace: diario-obra
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: diario-obras-api
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - diario-obra
